<!-- =========================
TUGAS JS PEMILIHAN
if else dan switch case
========================= -->

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>JS Pemilihan</title>
</head>
<body>

  <h2>Contoh If Else</h2>

  <script>
    // CONTOH IF ELSE
    let nilai = 85;

    if (nilai >= 90) {
      document.write("Nilai A <br>");
    } else if (nilai >= 80) {
      document.write("Nilai B <br>");
    } else if (nilai >= 70) {
      document.write("Nilai C <br>");
    } else {
      document.write("Nilai D <br>");
    }

    // CONTOH SWITCH CASE
    let hari = 3;

    switch(hari) {
      case 1:
        document.write("Senin");
        break;

      case 2:
        document.write("Selasa");
        break;

      case 3:
        document.write("Rabu");
        break;

      default:
        document.write("Hari tidak ditemukan");
    }
  </script>

</body>
</html>
