<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Modern</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#141e30,#243b55);
    }

    .calculator{
      width:360px;
      background:#1f2937;
      padding:20px;
      border-radius:20px;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    .title{
      color:white;
      text-align:center;
      margin-bottom:15px;
      font-size:24px;
      font-weight:bold;
    }

    #history{
      width:100%;
      height:30px;
      border:none;
      background:#111827;
      color:#9ca3af;
      text-align:right;
      padding:5px 10px;
      font-size:16px;
      border-radius:10px 10px 0 0;
    }

    #display{
      width:100%;
      height:70px;
      border:none;
      outline:none;
      background:#f9fafb;
      text-align:right;
      font-size:35px;
      padding-right:15px;
      border-radius:0 0 10px 10px;
      margin-bottom:20px;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:65px;
      border:none;
      border-radius:15px;
      font-size:22px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
    }

    .number{
      background:#374151;
      color:white;
    }

    .operator{
      background:#f59e0b;
      color:white;
    }

    .operator:hover{
      background:#d97706;
    }

    .equal{
      background:#10b981;
      color:white;
      grid-column:span 2;
    }

    .equal:hover{
      background:#059669;
    }

    .clear{
      background:#ef4444;
      color:white;
    }

    .clear:hover{
      background:#dc2626;
    }

    .special{
      background:#6366f1;
      color:white;
    }

    .special:hover{
      background:#4f46e5;
    }

  </style>
</head>

<body>

<div class="calculator">

  <div class="title">Kalkulator Modern</div>

  <input type="text" id="history" disabled>
  <input type="text" id="display" disabled>

  <div class="buttons">

    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="special" onclick="deleteLast()">⌫</button>
    <button class="special" onclick="appendValue('%')">%</button>
    <button class="operator" onclick="appendValue('/')">÷</button>

    <button class="number" onclick="appendValue('7')">7</button>
    <button class="number" onclick="appendValue('8')">8</button>
    <button class="number" onclick="appendValue('9')">9</button>
    <button class="operator" onclick="appendValue('*')">×</button>

    <button class="number" onclick="appendValue('4')">4</button>
    <button class="number" onclick="appendValue('5')">5</button>
    <button class="number" onclick="appendValue('6')">6</button>
    <button class="operator" onclick="appendValue('-')">−</button>

    <button class="number" onclick="appendValue('1')">1</button>
    <button class="number" onclick="appendValue('2')">2</button>
    <button class="number" onclick="appendValue('3')">3</button>
    <button class="operator" onclick="appendValue('+')">+</button>

    <button class="special" onclick="squareRoot()">√</button>
    <button class="number" onclick="appendValue('0')">0</button>
    <button class="special" onclick="appendValue('.')">.</button>

    <button class="equal" onclick="calculate()">=</button>

  </div>

</div>

<script>

  let display = document.getElementById("display");
  let history = document.getElementById("history");

  function appendValue(value){
    display.value += value;
  }

  function clearDisplay(){
    display.value = "";
    history.value = "";
  }

  function deleteLast(){
    display.value = display.value.slice(0,-1);
  }

  function calculate(){

    try{

      history.value = display.value;

      let result = eval(display.value);

      display.value = result;

    }catch(error){

      display.value = "Error";

    }

  }

  function squareRoot(){

    try{

      history.value = "√(" + display.value + ")";

      display.value = Math.sqrt(eval(display.value));

    }catch(error){

      display.value = "Error";

    }

  }

  // keyboard support
  document.addEventListener("keydown", function(event){

    const key = event.key;

    if(!isNaN(key) || ['+','-','*','/','.','%'].includes(key)){
      appendValue(key);
    }

    if(key === "Enter"){
      calculate();
    }

    if(key === "Backspace"){
      deleteLast();
    }

    if(key === "Escape"){
      clearDisplay();
    }

  });

</script>

</body>
</html>
